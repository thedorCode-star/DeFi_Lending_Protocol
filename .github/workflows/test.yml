name: Web3 Test Suite

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allows manual trigger

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
      # npm ci is faster and more reliable for CI
    
    - name: Run Hardhat tests with coverage
      # 'shell: bash' enables pipefail, so a test failure isn't masked by tee
      shell: bash
      run: npx hardhat test --coverage | tee test-output.txt
      env:
        CI: true  # Ensures tests exit with proper code
    
    - name: Publish report to job summary
      if: always()
      shell: bash
      run: |
        echo '## Test & Coverage Report' >> "$GITHUB_STEP_SUMMARY"
        echo '```' >> "$GITHUB_STEP_SUMMARY"
        cat test-output.txt >> "$GITHUB_STEP_SUMMARY"
        echo '```' >> "$GITHUB_STEP_SUMMARY"
    
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-and-coverage-report
        path: |
          test-output.txt
          coverage/
        if-no-files-found: ignore